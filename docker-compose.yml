services:
  zotero-server:
    build:
      context: .
      dockerfile: zotero_server/Dockerfile
    container_name: zotero-server
    restart: unless-stopped
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      ZOTERO_PORT: "8080"
      ZOTERO_ADMIN_TOKEN: "${ZOTERO_ADMIN_TOKEN}"
      ZOTERO_DATABASE_URL: "sqlite+aiosqlite:////data/zotero.db"
      ZOTERO_LOG_LEVEL: "DEBUG"
    volumes:
      - ./data/server:/data

  zotero-webdav:
    image: rclone/rclone:latest
    container_name: zotero-webdav
    restart: unless-stopped
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    ports:
      - "127.0.0.1:9000:9000"
    command:
      - serve
      - webdav
      - /data
      - --addr
      - :9000
    volumes:
      - ./data/webdav:/data
